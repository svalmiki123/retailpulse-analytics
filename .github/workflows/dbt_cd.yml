name: dbt CD — Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'dbt_retailpulse/**'
      - '.github/workflows/dbt_cd.yml'

env:
  PROJECT_DIR: dbt_retailpulse

jobs:
  dbt-prod:
    name: dbt Production Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: pip install -r requirements.txt

      - name: Create dbt profiles.yml
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          SNOWFLAKE_ORGANIZATION: ${{ secrets.SNOWFLAKE_ORGANIZATION }}
          SNOWFLAKE_ACCOUNT_NAME: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        run: |
          mkdir -p profiles
          # Construct full account identifier: organization-account_name
          FULL_ACCOUNT="${SNOWFLAKE_ORGANIZATION}-${SNOWFLAKE_ACCOUNT_NAME}"
          cat > profiles/profiles.yml <<EOF
          dbt_retailpulse:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${FULL_ACCOUNT}"
                user: "{{ env_var('SNOWFLAKE_USERNAME') }}"
                password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
                role: DBT_ROLE
                warehouse: TRANSFORM_WH
                database: PROD_DB
                schema: SILVER
                threads: 4
                client_session_keep_alive: false
                query_tag: dbt_prod
          EOF

      - name: Install dbt packages
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          SNOWFLAKE_ACCOUNT:    ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME:   ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD:   ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: dbt deps

      - name: dbt build production
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          SNOWFLAKE_ACCOUNT:    ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME:   ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD:   ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          dbt build \
            --target prod \
            --profiles-dir profiles

      # ── Upload prod manifest to S3 for slim CI ────────────
      - name: Upload prod manifest to S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
        run: |
          aws s3 cp \
            ${{ env.PROJECT_DIR }}/target/manifest.json \
            s3://retailpulse-data-lake-siva-valmiki/dbt-artifacts/prod/manifest.json

      - name: dbt docs generate
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          SNOWFLAKE_ACCOUNT:    ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME:   ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD:   ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          dbt docs generate \
            --target prod \
            --profiles-dir profiles

      - name: Upload docs to S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
        run: |
          aws s3 sync \
            ${{ env.PROJECT_DIR }}/target/ \
            s3://retailpulse-data-lake-siva-valmiki/dbt-docs/ \
            --exclude "*" \
            --include "manifest.json" \
            --include "catalog.json" \
            --include "index.html"

      - name: Notify success
        run: |
          echo "✅ Production deploy complete"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "dbt docs: https://retailpulse-data-lake-siva-valmiki.s3.amazonaws.com/dbt-docs/index.html"
