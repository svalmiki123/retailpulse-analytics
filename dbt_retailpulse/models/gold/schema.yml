version: 2

models:

  - name: dim_date
    description: "Date dimension. One row per calendar date 2023-2027."
    columns:
      - name: date_day
        tests:
          - unique
          - not_null
      - name: date_key
        tests:
          - unique
          - not_null

  - name: dim_customers
    description: "Customer dimension enriched with order history and value tier."
    columns:
      - name: customer_sk
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null
      - name: value_tier
        tests:
          - accepted_values:
              arguments:
                values: ['High Value', 'Mid Value', 'Low Value', 'No Orders']

  - name: dim_products
    description: "Product dimension enriched with sales performance tier."
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null
      - name: performance_tier
        tests:
          - accepted_values:
              arguments:
                values: ['Top Seller', 'Mid Seller', 'Low Seller', 'Never Sold']

  - name: fct_orders
    description: "Central fact table. One row per order."
    config:
      contract:
        enforced: true
    columns:
      - name: order_sk
        data_type: varchar
        tests: [unique, not_null]
      - name: order_id
        data_type: integer
        tests: [unique, not_null]
      - name: customer_sk
        data_type: varchar
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_sk
      - name: product_sk
        data_type: varchar
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_sk
      - name: order_date_key
        data_type: number
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: order_status
        data_type: varchar
        tests: [not_null]
      - name: region
        data_type: varchar
      - name: order_date
        data_type: date
        tests: [not_null]
      - name: ship_date
        data_type: date
      - name: days_to_ship
        data_type: number
      - name: customer_segment
        data_type: varchar
      - name: customer_value_tier
        data_type: varchar
      - name: product_category
        data_type: varchar
      - name: product_subcategory
        data_type: varchar
      - name: product_price_tier
        data_type: varchar
      - name: order_year
        data_type: number
      - name: order_quarter
        data_type: varchar
      - name: order_month
        data_type: varchar
      - name: ordered_on_weekend
        data_type: boolean
      - name: quantity
        data_type: number
        tests: [not_null]
      - name: unit_price
        data_type: float
      - name: discount
        data_type: float
      - name: net_amount
        data_type: float
      - name: revenue
        data_type: float
        tests: [not_null]
      - name: is_returned
        data_type: number
      - name: has_discount
        data_type: number
      - name: _ingested_at
        data_type: timestamp_ntz
      - name: _source_file
        data_type: varchar