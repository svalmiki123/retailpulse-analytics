version: 2

models:

  - name: stg_orders
    description: >
      Cleaned and typed orders from Bronze. One row per order_id.
      Incremental — only new rows processed each run.
    columns:
      - name: order_id
        description: "Primary key — unique order identifier"
        tests:
          - unique
          - not_null
      - name: order_sk
        description: "Surrogate key generated by dbt_utils"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "FK to stg_customers"
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        description: "FK to stg_products"
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: status
        description: "Normalized order status"
        tests:
          - accepted_values:
              values: ['COMPLETED', 'PENDING', 'RETURNED']
      - name: order_date
        description: "Order date cast to DATE"
        tests:
          - not_null
      - name: net_amount
        description: "Calculated: (unit_price - discount) * quantity"
        tests:
          - not_null

  - name: stg_customers
    description: >
      Cleaned customer profiles from Bronze. One row per customer_id.
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: email
        description: "Lowercased email"
        tests:
          - unique
          - not_null
      - name: customer_segment
        description: "Normalized segment"
        tests:
          - accepted_values:
              values: ['Premium', 'Standard', 'Unknown']
      - name: signup_date
        description: "Customer signup date as DATE"
        tests:
          - not_null

  - name: stg_products
    description: >
      Cleaned product catalog from Bronze. One row per product_id.
    columns:
      - name: product_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: product_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: list_price
        description: "List price as FLOAT"
        tests:
          - not_null
      - name: margin_pct
        description: "Calculated margin percentage"
        tests:
          - not_null